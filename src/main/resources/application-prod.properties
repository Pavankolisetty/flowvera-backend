# Production profile - values should come from environment variables

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
server.port=${PORT:8080}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:https://vyaastechnologies.com,https://www.vyaastechnologies.com,https://app.vyaastechnologies.com}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:https://vyaastechnologies.com}
app.storage.provider=${STORAGE_PROVIDER:s3}

# do not enable SQL logging in prod by default
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update

jwt.secret=${JWT_SECRET}

# Production mail settings: use Amazon SES in AWS
app.mail.provider=${MAIL_PROVIDER:ses}
app.mail.from-name=${MAIL_FROM_NAME:Flowvera}
app.mail.from-address=${MAIL_FROM_ADDRESS:noreply@vyaastechnologies.com}
app.mail.http-timeout-seconds=${MAIL_HTTP_TIMEOUT_SECONDS:20}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}
sendgrid.api-key=${SENDGRID_API_KEY}
sendgrid.api-url=${SENDGRID_API_URL:https://api.sendgrid.com/v3/mail/send}
app.password-reset.otp-expiry-minutes=${PASSWORD_RESET_OTP_EXPIRY_MINUTES:10}
app.password-reset.reset-token-expiry-minutes=${PASSWORD_RESET_TOKEN_EXPIRY_MINUTES:10}
app.password-reset.cooldown-seconds=${PASSWORD_RESET_COOLDOWN_SECONDS:60}
app.registration.email-expiry-minutes=${REGISTRATION_EMAIL_EXPIRY_MINUTES:30}
app.registration.email-cooldown-seconds=${REGISTRATION_EMAIL_COOLDOWN_SECONDS:60}
app.registration.otp-expiry-minutes=${REGISTRATION_OTP_EXPIRY_MINUTES:10}
app.registration.otp-cooldown-seconds=${REGISTRATION_OTP_COOLDOWN_SECONDS:60}
app.registration.otp-max-attempts=${REGISTRATION_OTP_MAX_ATTEMPTS:5}
