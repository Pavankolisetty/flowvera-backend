# Local development profile

# DataSource configuration for local MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/workly_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

# Run on a non-default port so it does not conflict with other services
server.port=8082
app.cors.allowed-origin-patterns=http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173

# Mail configuration (dev defaults to env vars)
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:784395f137e7a9}
spring.mail.password=${MAIL_PASSWORD:61af38de107fd5}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}

# SQL logging to help during development
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# JWT secret used only in local/dev environment
jwt.secret=dev-secret

app.mail.from-name=Flowvera
app.password-reset.otp-expiry-minutes=10
app.password-reset.reset-token-expiry-minutes=10
app.password-reset.cooldown-seconds=60
