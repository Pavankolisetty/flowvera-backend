# Local development profile

# DataSource configuration for local MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/workly_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

# Run on a non-default port so it does not conflict with other services
server.port=8082

# SQL logging to help during development
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# JWT secret used only in local/dev environment
jwt.secret=dev-secret
