spring.application.name=workly
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# common JPA and upload settings
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload.dir=${FILE_UPLOAD_DIR:uploads/}
app.storage.provider=${STORAGE_PROVIDER:local}
aws.region=${AWS_REGION:ap-south-2}
aws.s3.bucket=${AWS_S3_BUCKET:}
aws.s3.key-prefix=${AWS_S3_KEY_PREFIX:workly}
app.timezone=${APP_TIMEZONE:Asia/Kolkata}
attendance.inactive-grace-minutes=3
attendance.absent-upper-limit-minutes=90
attendance.partial-upper-limit-minutes=270
attendance.holiday.google-calendar-enabled=true
attendance.holiday.google-calendar-id=en.indian#holiday@group.v.calendar.google.com
